<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡El Gran Rodeo de los 50! - Miguel Angel</title>
    <style>
        /* --- ESTILOS GENERALES Y TEMÁTICA --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Tipografía: Una de serif rústica para los títulos y sans-serif legible para el texto */
            font-family: 'Bookman Old Style', serif, 'Segoe UI', sans-serif;
        }

        body {
            /* Fondo rústico de madera oscura (textura CSS) */
            background-color: #3e2723; /* Marrón oscuro base */
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), /* Superposición oscura */
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgdmlld0JveD0iMCAwIDQwIDQwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiM1ZDRiM2EiIGZpbGwtb3BhY2l0eT0iMC4xNSI+PHBhdGggZD0iTTAgMGg0MHY0MEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4='); /* Textura de madera rústica (pequeña) */
            background-size: initial;
            color: #f3e5ab; /* Color crema/beige rústico */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- CONTENEDOR PRINCIPAL: ESTILO PERGAMINO/CUERO --- */
        .invitation-card {
            background-color: #d7ccc8; /* Beige claro base */
            background-image: 
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNiY2FhYTAiIGZpbGwtb3BhY2l0eT0iMC4zMSI+PHBhdGggZD0iTTAgMGgyMHYyMEgwVjB6bTIwIDIwaDIwdjIwSDIWMjB6TTAgMjBoMjB2MjBIMFYyMHoyMCAwaDIwdjIwSDIwVjB6Ii8+PC9nPjwvZz48L3N2Zz4='); /* Textura sutil de cuero o papel envejecido */
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 10px 10px 40px rgba(0, 0, 0, 0.8), -10px -10px 40px rgba(100, 70, 50, 0.3) inset; /* Sombra pesada */
            border: 8px solid #8d6e63; /* Borde ancho estilo madera/cuero */
            position: relative;
            overflow: hidden;
        }

        /* --- DECORACIONES TEMÁTICAS --- */

        /* Cuerda de lazo (borde superior e inferior con CSS) */
        .invitation-card::before,
        .invitation-card::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 15px;
            background: linear-gradient(90deg, transparent 50%, #8d6e63 50%), linear-gradient(90deg, #d4af37, transparent 50%); /* Cuerda sutil */
            background-size: 20px 100%;
            left: 0;
        }
        .invitation-card::before { top: 0; }
        .invitation-card::after { bottom: 0; }

        /* Icono de Sombrero Vaquero (símbolo Unicode o SVG) */
        .cowboy-hat {
            font-size: 3.5rem;
            color: #3e2723; /* Marrón oscuro */
            margin-bottom: 15px;
            text-shadow: 2px 2px 2px rgba(255, 255, 255, 0.2);
        }

        /* --- TIPOGRAFÍA VAQUERA --- */
        .header-text {
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #bf360c; /* Rojo pañuelo (Bandana Red) */
            font-weight: bold;
            margin-bottom: 5px;
        }

        .wANTED-text {
            font-family: 'Bookman Old Style', serif;
            font-size: 1.8rem;
            text-transform: uppercase;
            color: #d4af37; /* Dorado rústico */
            letter-spacing: 5px;
            margin-bottom: 5px;
        }

        .name {
            font-size: 3rem;
            font-weight: 700;
            color: #3e2723; /* Marrón oscuro */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .age-badge {
            font-size: 4.5rem;
            font-weight: 900;
            color: #bf360c; /* Rojo pañuelo */
            line-height: 0.9;
            margin-bottom: 25px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
        }

        .message {
            font-size: 1.15rem;
            font-style: italic;
            color: #4e342e; /* Marrón medio */
            margin-bottom: 35px;
            line-height: 1.7;
            padding: 0 10px;
        }

        .divider {
            height: 3px;
            width: 70%;
            background: linear-gradient(to right, transparent, #8d6e63 50%, transparent);
            margin: 20px auto;
        }

        /* --- DETALLES DEL EVENTO (RÚSTICO) --- */
        .info-section {
            margin-bottom: 35px;
            background-color: rgba(255, 255, 255, 0.3); /* Fondo ligero para la sección */
            border-radius: 10px;
            padding: 20px 0;
            border: 2px dashed #a1887f; /* Borde cosido */
        }

        .info-item {
            margin: 18px 0;
            font-size: 1.15rem;
            color: #3e2723;
        }

        .info-item strong {
            color: #bf360c; /* Rojo pañuelo */
            display: block;
            text-transform: uppercase;
            font-size: 0.95rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        /* Botas Vaqueras (Decoración de texto) */
        .info-item::after {
            
            font-size: 1rem;
            opacity: 0.5;
        }

        /* --- BOTÓN DE CONFIRMACIÓN (OESTE) --- */
        .btn-confirm {
            display: inline-block;
            background-color: #362420; /* Marrón oscuro */
            color: #f3e5ab; /* Crema */
            text-decoration: none;
            padding: 15px 35px;
            font-weight: bold;
            border-radius: 5px; /* Menos redondeado, más rústico */
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.5);
            border: 2px solid #a1887f;
            cursor: pointer;
        }

        .btn-confirm:hover {
            background-color: #5d4037;
            transform: scale(1.03);
            box-shadow: 6px 6px 15px rgba(0, 0, 0, 0.6);
        }

        /* --- ADAPTACIÓN PARA MÓVILES --- */
        @media (max-width: 450px) {
            .name { font-size: 2.3rem; }
            .age-badge { font-size: 3.5rem; }
            .wANTED-text { font-size: 1.5rem; }
            .cowboy-hat { font-size: 2.8rem; }
            .invitation-card { padding: 40px 15px; }
            .info-item { font-size: 1.05rem; }
        }
    </style>
</head>
<body>

    <div class="invitation-card">
        <!-- Decoración Superior: Sombrero -->
        <div class="cowboy-hat">🤠</div>

        <p class="wANTED-text">COWBOY / Vaquero</p>
        <h1 class="name">Miguel Angel Villarreal Amaya</h1>
        <div class="age-badge">50 AÑOS</div>
        
        <p class="message">
            ¡Te invito a celebrar medio siglo de aventuras y risas!"
        </p>

        <div class="divider"></div>

        <!-- Información del Evento: Estilo Rústico -->
        <div class="info-section">
            <div class="info-item">
                <strong>Gran Día</strong>
                Sábado, 15 de Julio de 2026
            </div>
            
            <div class="info-item">
                <strong>Hora</strong>
                8:00 PM
            </div>
            
            <div class="info-item">
                <strong>Lugar de encuentro</strong>
                Mi casa tarachi, son. <br>
                
            </div>

            <div class="info-item">
                <strong>Vestimenta Vaquera</strong>
                ¡Botas y sombrero !
            </div>
        </div>

        <div class="divider"></div>

        <!-- Botón de WhatsApp (Estilo Western) -->
        <!-- Cambia el número después de 'phone=' (incluye código de país) y edita el mensaje de texto -->
        <a href="https://wa.me/526625888059?text=¡Te confirmo mi asistencia a la fiesta, de Miguel!." 
           target="_blank" 
           class="btn-confirm">
            Confirmar mi lugar 
        </a>
        <a href="https://wa.me/526625888059?text=¡No podré asistir a la fiesta, de Miguel!." 
           target="_blank" 
           class="btn-confirm" style="margin-top: 15px; display: block;">
            No podré asistir
    </div>

</body>
</html>
